server:
  port: 8084

spring:
  application:
    name: billing-service

  datasource:
    url: jdbc:mysql://localhost:3306/hotel_billing_db?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
