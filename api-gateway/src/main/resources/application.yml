server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: room-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/rooms/**

        - id: guest-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/guests/**

        - id: reservation-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/reservations/**

        - id: billing-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/bills/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
